# 推送 main 时构建 frontend 并发布到 GitHub Pages（需在仓库 Settings → Pages 中将 Source 设为 GitHub Actions）
# 自定义域名 aptori.xin：在 Pages 中填写域名；CNAME 由 frontend/public/CNAME 在构建时带入 dist

name: Deploy GitHub Pages

on:
  workflow_dispatch:   # 已迁移到阿里云，保留此文件仅供参考，取消自动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
