name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_Zdq7OkjJ7gYjlIuKaxBbC8md
          vercel-project-id: prj_wzaqZMioyT3nrWeL1SMdTaLGihU9
          working-directory: ./frontend
          vercel-args: '--prod'
