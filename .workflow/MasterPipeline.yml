# Gitee Go：推送 main 分支后构建前端并部署到 Gitee Pages 分支 gitee-pages
#
# 变量不要用 GITEE_ 前缀、不要用名 GITEE_REPO（与系统内置参数冲突）。
# 在「流水线变量 / 通用变量」中配置（令牌务必保密）：
#   DEPLOY_USERNAME — Gitee 登录用户名
#   DEPLOY_TOKEN    — 私人令牌（需能 push 本仓库）
#   DEPLOY_REPO     — 仓库全路径，本仓库为 yasenrk/aptori
#
# Gitee Pages：分支 gitee-pages，目录 /

version: '1.0'
name: deploy-gitee-pages
displayName: 构建并部署 Gitee Pages
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
stages:
  - name: build-and-publish
    displayName: 构建并发布静态站
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@nodejs
        name: build_and_push_pages
        displayName: Node 构建并推送 gitee-pages
        # 须与 Gitee 构建环境里可选 Node 版本一致；若仍报配置错误可改为 16.20.2
        nodeVersion: 18.19.0
        commands:
          - set -e && npm config set registry https://registry.npmmirror.com
          - cd frontend && npm ci && npm run build
          - cd frontend/dist && git init && git config user.email "ci@gitee.com" && git config user.name "Gitee Go" && git add -A && git commit -m "chore(pages): deploy from Gitee Go" && git branch -M gitee-pages
          - cd frontend/dist && git push --force "https://${DEPLOY_USERNAME}:${DEPLOY_TOKEN}@gitee.com/${DEPLOY_REPO}.git" gitee-pages
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - frontend/dist
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
